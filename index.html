<!--
Projeto: Formulário de Pesquisa sobre Sustentabilidade
Objetivo: Praticar a criação de formulários com HTML e CSS
Autor: Jonh Nobre
-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Sustentabilidade</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">

        <header class="header">
            <h1 id="title">Pesquisa sobre Sustentabilidade</h1>
            <p id="description">
                A sua opinião é importante para promover práticas sustentáveis!
            </p>
        </header>

        <form id="survey-form">

            <!-- Nome -->
            <label id="name-label" for="name">Nome</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Digite seu nome"
              required
            >

            <!-- E-mail -->
            <label id="email" for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Digite seu e-mail"
              required
            >

            <!-- Idade -->
            <label id="number-label" for="number">Idade</label>
            <input
              type="number"
              id="number"
              name="age"
              min="10"
              max="100"
              placeholder="Idade"
            >

            <!-- Nível de conhecimento -->
            <label for="dropdown">
                Qual o seu nível de conhecimento sobre sustentabilidade?
            </label>
            <select id="dropdown" name="nivel">
                <option value="">Selecione uma opção</option>
                <option value="nenhum">Não conheço o assunto</option>
                <option value="iniciante">Conhecimento básico</option>
                <option value="intermediario">Conhecimento intermediário</option>
                <option value="avancado">Conhecimento avançado</option>
            </select>

            <!-- Rádio -->
            <p>Você pratica ações sustentáveis no dia a dia?</p>
            <label>
                <input type="radio" name="pratica" value="sim"> Sim
            </label>
            <label>
                <input type="radio" name="pratica" value="as_vezes"> Às vezes
            </label>
            <label>
                <input type="radio" name="pratica" value="nao"> Não
            </label>

            <!-- Checkbox -->
            <p>Quais práticas você realiza? (Marque todas que se aplicam)</p> 
            <label>
                <input type="checkbox" value="reciclagem"> Reciclagem
            </label>
            <label>
                <input type="checkbox" value="economia_agua"> Economia de água
            </label>
            <label>
                <input type="checkbox" value="economia_energia"> Economia de energia
            </label>
            <label>
                <input type="checkbox" value="transporte_sustentavel"> Transporte sustentável
            </label>

            <!-- Comentário -->
            <label for="comments">Sugestões ou comentários:</label>
            <textarea
              id="comments"
              name="comentarios"
              placeholder="Digite aqui sua opinião..."
            ></textarea>

            <!-- Botão de enviar -->
            <button id="submit" type="submit">Enviar</button>

        </form>

    </div>
</body>
</html>
