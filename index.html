Projeto: Formulário de Pesquisa sobre Sustentabilidade
Objetivo: Praticar a criação de formulários com HTML e CSS
Autor: Jonh Nobre
-->

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <!-- Configurações básicas -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título da página -->
  <title>Formulário de Sustentabilidade</title>

  <!-- Estilos da página (arquivo externo CSS) -->
  <link rel="stylesheet" href="styles.css">

  <!-- Ícone da página (atráves de arquivo png) -->
  <link rel="icon" type="image/png" href="favicon.png">

</head>

<body>

  <!-- Container principal que centraliza o conteúdo -->
  <div class="container">

    <!-- Cabeçalho do formulário -->
    <header class="header">

      <!-- Título principal -->
      <h1 id="title">Pesquisa sobre Sustentabilidade</h1>

      <!-- Descrição do formulário -->
      <p id="description">
        A sua opinião é importante para promover práticas sustentáveis!
      </p>

    </header>

    <!-- Início do formulário -->
    <form id="survey-form">

      <!-- Campo de nome -->
      <label id="name-label" for="name">Nome</label>
      <input 
        type="text" 
        id="name" 
        name="name" 
        placeholder="Digite seu nome" 
        required
      >

      <!-- Campo de email -->
      <label id="email-label" for="email">Email</label>
      <input 
        type="email" 
        id="email" 
        name="email" 
        placeholder="Digite seu email" 
        required
      >

      <!-- Campo de idade -->
      <label id="number-label" for="number">Idade</label>
      <input 
        type="number" 
        id="number" 
        name="age" 
        min="10" 
        max="100" 
        placeholder="Idade"
      >

      <!-- Seleção de nível de conhecimento -->
      <label for="dropdown">
        Qual o seu nível de conhecimento sobre sustentabilidade?
      </label>
      <select id="dropdown" name="nivel">

        <!-- Opção padrão -->
        <option value="">Selecione uma opção</option>

        <option value="iniciante">Iniciante</option>
        <option value="intermediario">Intermediário</option>
        <option value="avancado">Avançado</option>
      </select>

      <!-- Pergunta com botões de rádio -->
      <p>Você pratica ações sustentáveis no dia a dia?</p>

      <label>
        <input type="radio" name="pratica" value="sim"> Sim
      </label>

      <label>
        <input type="radio" name="pratica" value="as_vezes"> Às vezes
      </label>

      <label>
        <input type="radio" name="pratica" value="nao"> Não
      </label>

      <label>
        <input type="radio" name="pratica" value="raramente"> Raramente
      </label>

      <!-- Pergunta com múltipla escolha (checkbox) -->
      <p>Quais práticas você realiza? (Marque todas que se aplicam)</p>

      <label>
        <input type="checkbox" value="reciclagem"> Reciclagem
      </label>

      <label>
        <input type="checkbox" value="economia_agua"> Economia de água
      </label>

      <label>
        <input type="checkbox" value="economia_energia"> Economia de energia
      </label>

      <label>
        <input type="checkbox" value="transporte_sustentavel">
        Transporte sustentável
      </label>

      <label>
        <input type="checkbox" value="consumo_consciente"> Consumo consciente
      </label>

      <!-- Campo de texto para comentários -->
      <div>
      <label for="comments">Sugestões ou comentários:</label>
      <textarea 
        id="comments" 
        name="comentarios" 
        placeholder="Digite aqui sua opinião..."
      ></textarea>
      </div>

      <!-- Botão de envio -->
      <button id="submit" type="submit">Enviar</button>

        </form>

    </div>

    <footer class="footer">
      <p class="footer-texto">&copy; 2026 - Jonh Rangel</p>
      <p class="footer-contato">| Contato: jonhrangel123@gmail.com</p>
    </footer>
</body>
</html>
